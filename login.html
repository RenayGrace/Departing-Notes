<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log In — DepartingNotes</title>
<meta name="description" content="Log in to your DepartingNotes member account.">
<link rel="icon" href="assets/img/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<header class="site-header">
  <div class="wrap nav">
    <a href="index.html" class="brand" aria-label="DepartingNotes home"><svg class="mark" viewBox="0 0 40 40" fill="none" aria-hidden="true"><rect x="3" y="14" width="34" height="22" rx="6" fill="#1F3D34"/><path d="M6 17.5 20 27l14-9.5" stroke="#FBF8F3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 14c0-4 2.4-6.8 0-11-2.4 4.2 0 7 0 11Z" fill="#8BA888"/><path d="M20 14c.2-3 2.6-4.6 5-5.2-1 2.8-2.6 4.4-5 5.2Z" fill="#B9802F"/><circle cx="20" cy="5" r="1.8" fill="#EAD9BC"/></svg> DepartingNotes</a>
    <div class="nav-actions"><span class="small muted">New here?</span> <a href="register.html" class="btn btn-primary">Create Free Account</a></div>
  </div>
</header>
<main>
<section style="min-height:78vh; display:flex; align-items:center; position:relative; overflow:hidden">
  <div class="ambient a1"></div><div class="ambient a2"></div>
  <div class="wrap" style="max-width:460px; position:relative">
    <div class="head-block center reveal in mb-2"><span class="eyebrow" style="justify-content:center">Welcome back</span><h1 style="font-size:2.4rem">Log in</h1></div>
    <form class="form-card reveal in" data-validate data-success="Signing you in…">
      <div class="field"><label for="lem">Email address <span class="req">*</span></label><input id="lem" name="email" type="email" autocomplete="email" required><span class="error">Please enter a valid email.</span></div>
      <div class="field"><label for="lpw">Password <span class="req">*</span></label><input id="lpw" name="password" type="password" autocomplete="current-password" required><span class="error">Required</span></div>
      <div class="flex between items-center mb-2"><label class="checkrow" style="margin:0"><input type="checkbox"> Remember me</label><a href="#" class="small" style="color:var(--gold); font-weight:600">Forgot password?</a></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Log In</button>
      <p class="center small muted mt-2">Don't have an account? <a href="register.html" style="color:var(--gold); font-weight:600">Create one free</a></p>
    </form>
    <p class="center small muted mt-2">Are you an executor? <a href="release.html" style="color:var(--forest); font-weight:600; text-decoration:underline">Visit the Release Portal</a></p>
  </div>
</section>
</main>
<footer class="site-footer"><div class="wrap"><div class="footer-bottom" style="border:none; margin:0; justify-content:center"><span>© <span data-year>2026</span> DepartingNotes Co. — A platform by R. Grace Rodriguez, Esq.</span></div></div></footer>
<div class="toast" id="toast" role="status" aria-live="polite"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg><span class="msg"></span></div>
<script src="assets/js/main.js"></script>
</body>
</html>
